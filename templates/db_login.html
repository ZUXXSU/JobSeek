{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card border-danger shadow">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0 text-center">Database Access</h3>
            </div>
            <div class="card-body">
                <p class="text-muted text-center">Enter the DB_SECRET to manage the system.</p>
                <form method="POST">
                    <div class="mb-3">
                        <input type="password" name="secret" class="form-control text-center" placeholder="Enter Secret Key" required autofocus>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-danger">Authenticate</button>
                    </div>
                </form>
            </div>
        </div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger mt-3 text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>
</div>
{% endblock %}
