{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow border-dark">
            <div class="card-header bg-dark text-white text-center py-3">
                <h3 class="mb-0"><i class="bi bi-shield-lock me-2"></i>Admin Token Portal</h3>
            </div>
            <div class="card-body p-4">
                <p class="text-muted text-center mb-4">Provide the Admin Secret Key to generate a secure access token.</p>
                
                <form action="{{ url_for('admin_verify') }}" method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-uppercase">Admin Secret Key</label>
                        <input type="password" name="secret_key" class="form-control form-control-lg" placeholder="Enter System Secret" required autofocus>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-dark btn-lg">Generate Token & Access Dashboard</button>
                    </div>
                </form>

                {% if error %}
                <div class="alert alert-danger mt-3">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                </div>
                {% endif %}
                
                <div class="text-center mt-3">
                    <a href="{{ url_for('dashboard') }}" class="text-decoration-none small text-muted">
                        <i class="bi bi-arrow-left me-1"></i> Back to User Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
